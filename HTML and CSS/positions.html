<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .nav{
            width:200px;
            height:50px;
            background-color: lightblue;
            top:0;
            position:fixed ;
        }
        .div1{
            width:200px;
            height:200px;
            background-color: lightcoral;
            position: relative;
            z-index: 4;
        }

        .div2{
            width:200px;
            height:200px;
            background-color: lightgreen;
        }
        .abs{
            background-color: red;
            position:absolute;
            left:50%;
        }
        .rel{
            background-color: red;
            position:relative;
            left:100%;
        }
    </style>
</head>
<body style="height:3000px; padding-top:50px;">
    <div class="nav">nav</div>
    <div class="div1">div1
        <div class="abs">Hi</div>
    </div>
    <div class="div2">div2
        <div class="rel">Hello</div>
    </div>
</body>
</html>
