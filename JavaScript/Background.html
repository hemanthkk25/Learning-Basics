<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
</head>
<body>

    <button onclick="changeColor()" class="btn">
        Change Color
    </button>

<script>

    let btn = document.querySelector(".btn");

    function changeColor() {

        if (document.body.style.backgroundColor === "red") {
            document.body.style.backgroundColor = "blue";
            btn.innerHTML = "Current Color: Blue";
        }

        else if (document.body.style.backgroundColor === "blue") {
            document.body.style.backgroundColor = "green";
            btn.innerHTML = "Current Color: Green";
        }

        else if (document.body.style.backgroundColor === "green") {
            document.body.style.backgroundColor = "yellow";
            btn.innerHTML = "Current Color: Yellow";
        }

        else {
            document.body.style.backgroundColor = "red";
            btn.innerHTML = "Current Color: Red";
        }

    }

</script>

</body>
</html>
