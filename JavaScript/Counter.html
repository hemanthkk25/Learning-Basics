<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="display: flex;">
        <button onclick="sub();" class="subtr">-</button>
        <p class="res">0</p>
        <button onclick="add();" class="addition">+</button>
    </div>
</body>
<script>
    let res=document.querySelector(".res");
    function sub(){
        if (Number(res.innerHTML)<=0){
            res.innerHTML="Negative number not allowed"
        }
        else{
            res.innerHTML=Number(res.innerHTML)-1;
        }
    }
    function add(){
        if (res.innerHTML==="Negative number not allowed"){
            res.innerHTML=0;
        }
        else {
            res.innerHTML=Number(res.innerHTML)+1;
        }
    }
</script>
</html>
