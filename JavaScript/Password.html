<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="password" class="pass">
    <button onclick="tlg()" class="butn">Show password</button>
</body>
<script>
    let inp=document.querySelector(".pass");
    let btn=document.querySelector(".butn");
    function tlg(){
        if (inp.type==="password"){
            inp.type="text";
            btn.innerHTML="Hide password"
        }
        else {
            inp.type="password";
            btn.innerHTML="Show password";
        }
    }
</script>
</html>
